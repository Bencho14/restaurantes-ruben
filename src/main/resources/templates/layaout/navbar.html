<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
            <img th:src="@{/images/logo.png}" alt="Restaurantes"
                 height="32" class="me-2 rounded-3">
            <!--            <span>Restaurantes</span>-->
        </a>
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/restaurants}">
                        <i class="fa-solid fa-store me-1"></i> Restaurantes
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dishes}">
                        <i class="fa-solid fa-bowl-food me-1"></i> Platos
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/reviews}">
                        <i class="fa-solid fa-star me-1"></i> Reseñas
                    </a>
                </li>
                <li class="nav-item" >
                    <a class="nav-link" th:href="@{/orders}">
                        <i class="fa-solid fa-ticket me-1"></i> Pedidos
                    </a>
                </li>
            </ul>

            <a sec:authorize="!isAuthenticated()" class="btn btn-secondary me-2" th:href="@{/login}">
                <i class="fa-solid fa-sign-in"></i> Login
            </a>
            <a sec:authorize="!isAuthenticated()" class="btn btn-secondary" th:href="@{/register}">
                <i class="fa-solid fa-circle-user"></i> Registro
            </a>

            <span class="text-light me-2" sec:authorize="isAuthenticated()">
                <i class="fa-solid fa-user"></i>
                <span sec:authentication="name"></span>
            </span>

            <form th:action="@{/logout}" method="post" class="d-inline" sec:authorize="isAuthenticated()">
                <button class="btn btn-secondary">
                    <i class="fa-solid fa-sign-out"></i> Salir
                </button>
            </form>


        </div>
    </div>
</nav>
</body>
</html>
